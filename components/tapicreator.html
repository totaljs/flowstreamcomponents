<script total>

	exports.id = 'tapicreator';
	exports.name = 'API Creator';
	exports.group = 'Total.js';
	exports.icon = 'ti ti-crosshairs';
	exports.version = '1';
	exports.author = 'Peter Širka | Total.js';
	exports.config = { path: 'response', schema: [{ id: 'i1984', name: 'Users|read' }] };
	exports.outputs = [{ id: 'output', name: 'Output' }];
	exports.inputs = [{ id: 'input', name: 'Payload' }];
	exports.kind = 'action';

	exports.make = function(instance, config) {

		let inputs = {};

		instance.message = function($) {
			let payload = {};
			payload.schema = inputs[$.input] || 'Unknown';
			payload.data = $.data;
			$.send('output', payload);
		};

		instance.configure = function() {

			const input = [];

			for (let item of config.schema) {

				if (!item)
					continue;

				let params = item.name.split('/').trim();
				const name = params.shift();

				for (let i = 0; i < params.length; i++)
					params[i] = params[i].replace(/\{|\}/g, '');

				inputs[item.id] = item.name;
				input.push({ id: item.id, name: item.name });
			}

			const prev = JSON.stringify(instance.input);
			const curr = JSON.stringify(input);

			if (prev !== curr) {
				instance.input = input;
				instance.save();
			}

		};

		instance.configure();
	};

</script>

<script>

	TOUCH(function(exports, reinit) {

		exports.settings = function(meta) {

			if (!meta.config.schema.length) {
				var obj = {};
				obj.id = 'o' + Math.random().toString(36).substring(6);
				obj.name = 'users_read/{id}';
				meta.config.schema.push(obj);
			}

			var tmp = W.tapicreator;

			if (!tmp) {

				tmp = {};
				tmp.add = function(el) {
					var scope = M.is20 ? el.plugin() : el.scope();
					var obj = {};
					obj.id = 'i' + Math.random().toString(36).substring(6);
					obj.name = 'Users|read';
					scope.push('schema @change', obj);
				};

				tmp.rem = function(el) {
					var id = ATTRD(el);
					var scope = M.is20 ? el.plugin() : el.scope();
					var model = scope.get();
					var index = model.schema.findIndex('id', id);
					model.schema.splice(index, 1);
					scope.update('schema @change');
				};

				tmp.move = function(el) {

					var scope = M.is20 ? el.plugin() : el.scope();
					var id = ATTRD(el);
					var container = el.closest('figure');
					var schema = scope.get().schema;
					var index = schema.findIndex('id', id);
					var is = false;
					var isup = el.attrd('type') === 'up';

					if (isup) {
						if (index > 0) {
							var a = schema[index];
							schema[index] = schema[index - 1];
							schema[index - 1] = a;
							is = true;
						}
					} else {
						if (index <= schema.length - 2) {
							var a = schema[index];
							schema[index] = schema[index + 1];
							schema[index + 1] = a;
							is = true;
						}
					}

					if (is) {
						NODEMOVE(container, isup);
						scope.update('schema @change');
						container.aclass('ismoved').rclass('ismoved', 500);
					}
				};

				tmp.name = function(opt, next) {
					opt.value = opt.value.replace(/(;|\s|,)/g, '').trim();
					var scope = M.is20 ? opt.element.plugin() : opt.element.scope();
					var id = ATTRD(opt.element);
					var item = scope.get().schema.findItem('id', id);
					item.name = opt.value;
					scope.update('schema @change');
					next(true);
				};

				W.tapicreator = tmp;
			}
		};

		exports.configure = function() {
			let changes = exports.instance.changes;
			if (changes && changes.newbie) {
				let inputs = [];
				for (let item of exports.config.schema)
					inputs.push({ id: item.id, name: item.name });
				exports.instance.inputs = inputs;
				UPD('flow.data');
			}
		};

	});

</script>
