<script total>

	exports.id = 'ollamals';
	exports.name = 'Ollama models';
	exports.icon = 'ti ti-robot';
	exports.author = 'Peter Širka | Total.js';
	exports.version = '1';
	exports.group = 'Ollama';
	exports.config = { url: 'http://localhost:11434' };
	exports.inputs = [];
	exports.outputs = [];
	exports.meta = { singleton: true };

	exports.make = function(instance, config) {

		let cfg = {};
		let arr = [];
		let status = { models: [], stats: [] };
		let interval = null;

		function parseOllamaModelfile(name, body) {

			const lines = body.replace(/\r\n/g, '\n').split('\n');
			const json = {};

			if (name)
				json.model = name;

			let index = 0;

			while (index < lines.length) {
				let line = lines[index].trim();

				if (!line || line.startsWith('#')) {
					index++;
					continue;
				}

				let match = line.match(/^([A-Z_]+)\s*(.*)$/);

				if (!match) {
					index++;
					continue;
				}

				let type = match[1];
				let value = match[2] || '';

				if (value.startsWith('"""')) {
					let result = readBlock(lines, index, value);
					value = result.value;
					index = result.index;
				} else {
					value = unquote(value.trim());
					index++;
				}

				switch (type) {
					case 'FROM':
						json.from = value;
						break;

					case 'SYSTEM':
						json.system = value;
						break;

					case 'TEMPLATE':
						json.template = value;
						break;

					case 'PARAMETER': {
						let parameter = parseParameter(value);

						if (parameter) {
							if (!json.parameters)
								json.parameters = {};

							// Ollama supports repeated stop parameters.
							if (parameter.name === 'stop') {
								if (!json.parameters.stop)
									json.parameters.stop = [];

								json.parameters.stop.push(parameter.value);
							} else
								json.parameters[parameter.name] = parameter.value;
						}

						break;
					}

					case 'MESSAGE': {
						let message = parseMessage(value);

						if (message) {
							if (!json.messages)
								json.messages = [];

							json.messages.push(message);
						}

						break;
					}

					case 'ADAPTER':
						if (!json.adapters)
							json.adapters = [];

						json.adapters.push(value);
						break;

					case 'LICENSE':
						json.license = value;
						break;

					case 'REQUIRES':
						if (!json.requires)
							json.requires = [];

						json.requires.push(value);
						break;
				}
			}

			return json;

			function readBlock(lines, start, firstValue) {
				let value = firstValue.substring(3);
				let buffer = [];

				let end = value.indexOf('"""');

				if (end !== -1) {
					return {
						value: value.substring(0, end),
						index: start + 1
					};
				}

				if (value)
					buffer.push(value);

				let i = start + 1;

				while (i < lines.length) {
					let line = lines[i];
					let end = line.indexOf('"""');

					if (end !== -1) {
						buffer.push(line.substring(0, end));

						return {
							value: buffer.join('\n').trim(),
							index: i + 1
						};
					}

					buffer.push(line);
					i++;
				}

				throw new Error('Unclosed triple quoted block');
			}

			function parseParameter(value) {
				let match = value.match(/^([^\s]+)\s+([\s\S]+)$/);

				if (!match)
					return null;

				return {
					name: match[1],
					value: cast(unquote(match[2].trim()))
				};
			}

			function parseMessage(value) {
				let match = value.match(/^(system|user|assistant)\s+([\s\S]+)$/i);

				if (!match)
					return null;

				return {
					role: match[1].toLowerCase(),
					content: unquote(match[2].trim())
				};
			}

			function unquote(value) {
				if (!value)
					return value;

				if ((value[0] === '"' && value[value.length - 1] === '"') || (value[0] === '\'' && value[value.length - 1] === '\''))
					return value.substring(1, value.length - 1);

				return value;
			}

			function cast(value) {
				if (value === 'true')
					return true;

				if (value === 'false')
					return false;

				if (value === 'null')
					return null;

				if (/^-?\d+$/.test(value))
					return Number(value);

				if (/^-?\d+\.\d+$/.test(value))
					return Number(value);

				return value;
			}
		}

		function stats() {
			cfg.url && RESTBuilder.GET(Utils.link(cfg.url, '/api/ps')).callback(function(err, response) {

				if (err || !response || !response.models)
					return;

				let models = [];

				for (let model of response.models) {
					let details = model.details || {};
					models.push({
						name: model.name || model.model || '',
						size: model.size ? +model.size : 0,
						vram: model.size_vram ? +model.size_vram : 0,
						ctxlength: model.context_length || 0,
						parameters: details.parameter_size || ''
					});
				}

				status.stats = models;
				instance.status(status);
			});
		}

		instance.configure = instance.vary = function() {
			cfg = instance.replace(config);
			setTimeout(instance.trigger, 1000);
		};

		instance.close = function() {
			interval && clearInterval(interval);
			interval = null;
		};

		instance.trigger = function(data) {

			if (!cfg.url)
				return;

			if (data) {

				if (data.type === 'remove') {
					RESTBuilder.DELETE(Utils.link(cfg.url, '/api/delete'), { model: data.name }).callback(function(err) {
						instance.debug('Remove model: ' + data.name, err ? err.toString() : undefined);
						if (!err)
							instance.trigger();
					});
					return;
				}

				if (data.type === 'create') {
					RESTBuilder.POST(Utils.link(cfg.url, '/api/create'), parseOllamaModelfile(data.name, data.body)).callback(function(err) {
						instance.debug('Create model: ' + data.name, err ? err.toString() : undefined);
						if (!err)
							instance.trigger();
					});
					return;
				}

			}

			RESTBuilder.GET(Utils.link(cfg.url, '/api/tags')).callback(function(err, response) {
				instance.debug('Refresh models', err ? err.toString() : undefined);
				arr = [];
				if (response && response.models instanceof Array) {
					for (let m of response.models)
						arr.push({ name: m.name, size: m.size });
					arr.quicksort('name');
					status.models = arr;
					instance.status(status);
				}
			});

		};

		instance.call = function(name, callback) {
			RESTBuilder.POST(Utils.link(cfg.url, '/api/show'), { model: name }).callback(function(err, response) {
				if (err)
					callback('');
				else
					callback(response.modelfile);
			});
		};

		interval = setInterval(stats, 3000);
		instance.service = () => instance.trigger();
		instance.configure();

	};

</script>

	This component list all OLLAMA models.

	</div>

<body>
	<header>
		<button name="trigger" class="button">Refresh</button>
		<button class="button exec mr5 ml5" data-exec="/rmcreate">Create</button>
		<i class="$ICON"></i>$NAME
	</header>
	<footer>
		<ui-bind path="$STATUS.models" config="template:.item;show" class="block selectable">
			<script type="text/html">
				{{ foreach m in value }}
					<div class="item hellip" data-id="{{ m.name }}"><span class="exec red mr5" data-exec="/rmmodel"><i class="ti ti-remove"></i></span><span class="exec mr5" data-exec="/rmcopy"><i class="ti ti-copy"></i></span><span class="exec monospace" data-exec="?/clipboard">{{ m.name }}</span> <span class="gray">{{ m.size | filesize }}</span></div>
				{{ end }}
			</script>
		</ui-bind>
		<ui-bind path="$STATUS.stats" config="template:.item;show:value && value.length" class="stats selectable">
			<script type="text/html">
				{{ foreach m in value }}
					<div class="item hellip"><i class="ti ti-hourglass ti-spin mr5"></i><span>{{ m.name }}</span> <b>{{ m.parameters }}</b> <span class="gray">{{ m.vram | filesize }}</span></div>
				{{ end }}
			</script>
		</ui-bind>
	</footer>
</body>
