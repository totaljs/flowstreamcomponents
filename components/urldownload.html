<script total>

	exports.id = 'urldownload';
	exports.name = 'URL download';
	exports.icon = 'ti ti-download';
	exports.author = 'Peter Širka | Total.js';
	exports.version = '1';
	exports.group = 'Common';
	exports.config = { prop: 'url', path: 'response' };
	exports.inputs = [{ id: 'input', name: 'Input' }];
	exports.outputs = [{ id: 'output', name: 'Output' }, { id: 'error', name: 'Error' }];

	exports.make = function(instance, config) {

		instance.message = function($) {

			let data = $.data;
			let url = typeof(data) === 'string' ? data : data[cfg.prop];

			let opt = {};
			opt.method = 'GET';
			opt.url = url;
			opt.callback = function(err, response) {

				if (err) {
					if (typeof(data) === 'string')
						data = { url: data };
					data[config.path] = response.body;
					$.send('error', data);
					return;
				}


				if (typeof(data) === 'string')
					data = { url: data };
				data[config.path] = response.body;
				$.send('output', data);
			};

			REQUEST(opt);
		};

	};

</script>

<readme>
The component downloads content from the given URL.

__Payload__:

```js
{
	url: "https://www.totaljs.com"
}
```

__Response__:

```js
{
	url: "https://www.totaljs.com",
	response: "<!html .... >"
}
```
</readme>
