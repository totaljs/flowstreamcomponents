<script total>

	exports.id = 'extend';
	exports.name = 'Extend';
	exports.group = 'Common';
	exports.version = '3';
	exports.icon = 'ti ti-expand';
	exports.author = 'Peter Širka | Total.js';
	exports.config = { path: '', schema: [] };
	exports.inputs = [{ id: 'input', name: 'Input' }];
	exports.outputs = [{ id: 'output', name: 'Output' }];

	exports.make = function(instance, config) {

		var convert = function(item) {
			let max;
			let tmp;
			switch (item.convert) {
				case 'string':
					return instance.replace(item.value);
				case 'boolean':
					tmp = instance.replace(item.value);
					return tmp == 'true' || tmp === 'on' || tmp === '1';
				case 'number':
					return +instance.replace(item.value);
				case 'object':
					try {
						return new Function('return ' + item.value)();
					} catch (e) {}
				case 'date':
					return instance.replace(item.value).parseDate();
				case 'now':
					return new Date();
				case 'expire':
					return new Date().add(item.value);
				case 'uid':
					return UID();
				case 'time':
					return (new Date()).format('HH:mm:ss');
				case 'guid':
					return GUID();
				case 'random_number':
					max = item.value ? +item.value : 20;
					return U.random_number(max);
				case 'random_string':
					max = item.value ? +item.value : 20;
					return U.random_string(max);
				case 'random_text':
					max = item.value ? +item.value : 20;
					return U.random_text(max);
			}

			return item.value;
		};

		instance.message = function($) {

			var data = $.data;

			if (config.path)
				data = config.path ? U.get(data, config.path) : $.data;

			if (data) {
				for (var item of config.schema) {
					var val = convert(item);
					if (item.path) {
						U.set(data, item.path, val);
					} else {
						data = val;
						break;
					}
				}
			}

			$.send('output');
		};
	};

</script>

<settings>
	<div class="CLASS-settings">
		<div class="padding">
			<ui-component name="input" path="?.path" config="placeholder:path.to.property;monospace:1">Load data from the specific property/field</ui-component>
			<div class="help">Optional. The data for the extending will be loaded from the specific property/field.</div>
		</div>
		<hr class="nmt nmb" />
		<div class="padding">
			<div class="caption m">
				<div class="toolbar">
					<nav>
						<button class="exec" data-exec="tmpextend.add"><i class="ti ti-plus-circle"></i>Add</button>
					</nav>
				</div>
				<label>Paths</label>
			</div>
			<ui-bind path="?.schema" config="template:.tablerow --> data-id;show:value && value.length" class="tablecustom m block">
				<script type="text/html">
					{{ foreach m in value }}
					<div data-id="{{ m.id }}" class="tablerow">
						<div class="static"><span class="exec controll" data-exec="tmpextend.rem" title="Remove"><i class="ti ti-trash red"></i></span></div>
						<div class="static silver">path</div>
						<div class="dynamic">
							<div class="monospace edit hellip" data-edit="exec:tmpextend.path;required:1">{{ m.path }}</div>
						</div>
						<div class="static silver">value</div>
						<div class="dynamic">
							<div class="edit monospace hellip" data-type="to" data-edit="exec:tmpextend.value;selectall:1">{{ m.value }}</div>
						</div>
						<div class="static type" style="width:180px">
							<div class="exec hellip" data-exec="tmpextend.convert">{{ m.convert | tmpextendconvert }}</div>
						</div>
					</div>
					{{ end }}
				</script>
			</ui-bind>
		</div>
	</div>
</settings>

<script>

	TOUCH(function(exports, reinit) {

		exports.settings = function(meta) {

			var defitem = { path: 'name', value: 'Hello Total.js Flow', convert: 'string' };

			if (!meta.config.schema.length) {
				var obj = CLONE(defitem);
				obj.id = Math.random().toString(36).substring(4);
				meta.config.schema.push(obj);
			}

			var tmp = W.tmpextend;

			if (!tmp) {

				tmp = {};
				tmp.add = function(el) {
					let scope = M.is20 ? el.plugin(): el.scope();
					let obj = CLONE(defitem);
					obj.id = Math.random().toString(36).substring(4);

					if (M.is20) {
						scope.push('schema @change', obj);
					} else {
						scope.push('schema', obj);
						scope.change('*');
					}
				};

				tmp.rem = function(el) {
					let scope = M.is20 ? el.plugin(): el.scope();
					let id = ATTRD(el);
					let model = scope.get();
					let index = model.schema.findIndex('id', id);
					model.schema.splice(index, 1);
					if (M.is20) {
						scope.update('schema @change');
					} else {
						scope.update('schema');
						scope.change('*');
					}
				};

				tmp.path = function(opt, next) {
					opt.value = opt.value.replace(/(;|\s|,)/g, '').trim();
					let scope = M.is20 ? opt.element.plugin(): opt.element.scope();
					let id = ATTRD(opt.element);
					let item = scope.get().schema.findItem('id', id);
					item.path = opt.value;
					if (M.is20)
						scope.update('@change');
					else
						scope.change('*');
					next(true);
				};

				tmp.value = function(opt, next) {
					opt.value = opt.value.trim(); // .replace(/(;|\s|,)/g, '')
					let scope = M.is20 ? opt.element.plugin(): opt.element.scope();
					let id = ATTRD(opt.element);
					let item = scope.get().schema.findItem('id', id);
					item.value = opt.value;
					if (M.is20)
						scope.update('@change');
					else
						scope.change('*');
					next(true);
				};

				tmp.convert = function(el) {
					var opt = {};
					opt.element = el;
					opt.align = 'left';
					opt.raw = true;
					opt.items = tmp.convertors;
					opt.callback = function(selected) {
						let scope = M.is20 ? opt.element.plugin(): opt.element.scope();
						let id = ATTRD(el);
						let item = scope.get().schema.findItem('id', id);
						if (item)
							item.convert = selected.id;
						el.html(selected.name);
						if (M.is20)
							scope.update('@change');
						else
							scope.change('*');
					};
					SETTER('directory/show', opt);
				};

				tmp.convertors = [];
				tmp.convertors.push({ id: 'string', name: 'String' });
				tmp.convertors.push({ id: 'number', name: 'Number' });
				tmp.convertors.push({ id: 'boolean', name: 'Boolean' });
				tmp.convertors.push({ id: 'object', name: 'Object' });
				tmp.convertors.push({ id: 'date', name: 'Date' });
				tmp.convertors.push({ id: 'time', name: 'Time' });
				tmp.convertors.push({ id: 'now', name: 'Current date/time' });
				tmp.convertors.push({ id: 'expire', name: 'Date expiration' });
				tmp.convertors.push({ id: 'uid', name: 'UI' + 'D' });
				tmp.convertors.push({ id: 'guid', name: 'Guid' });
				tmp.convertors.push({ id: 'random_number', name: 'Random number' });
				tmp.convertors.push({ id: 'random_string', name: 'Random string' });
				tmp.convertors.push({ id: 'random_text', name: 'Random string and numbers' });

				Thelpers.tmpextendconvert = function(val) {
					return tmp.convertors.findValue('id', val, 'name', DEF.empty);
				};

				W.tmpextend = tmp;
			}
		};

	});

</script>
