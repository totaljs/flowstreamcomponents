<script total>

	exports.id = 'print';
	exports.name = 'Print';
	exports.group = 'Common';
	exports.version = '9';
	exports.icon = 'ti ti-print';
	exports.author = 'Peter Širka | Total.js';
	exports.config = { repo: false, data: true, once: false, length: 0, color: '' };
	exports.inputs = [{ id: 'input', name: 'Input' }];

	exports.make = function(instance, config) {

		function serializer(key, value) {
			return value && value.type === 'Buffer' && value.data ? ('<Buffer ' + value.data.splice(0, 10).map(n => n.toString(16).padLeft(2, '0')).join('') + '...') : typeof(value) === 'string' && config.length && value.length > config.length ? (value.substring(0, config.length) + '...') : value;
		}

		let is = false;

		instance.message = function($) {

			if (config.once && is) {
				$.destroy();
				return;
			}

			let data = $.data;

			if (config.data !== false) {
				if (data instanceof Buffer)
					data = '<Buffer ' + data.toString('hex').substring(0, 10) + '...';
			}

			let output = config.data && config.repo ? {} : null;

			if (config.repo) {
				if (output)
					output.repo = $.repo;
				else
					output = $.repository;
			}

			if (config.data) {
				if (output)
					output.data = $.data;
				else
					output = $.data;
			}

			if (output) {
				output = JSON.stringify(output, serializer);
				NOW = new Date();
				instance.status({ ts: NOW, data: output }, 200);
			}

			is = true;
			$.destroy();
		};

		instance.trigger = function() {
			is = false;
			instance.status('');
		};

	};

</script>

The component prints incoming data in a JSON format.

<body>
	<header>
		<button class="exec button" data-exec="=clear">Clear</button>
		<i class="$ICON"></i><ui-bind path="$CONFIG.once" config="text:value?'Example':'Print'"></ui-bind>
	</header>
	<footer>
		<ui-bind path="!$STATUS" config="show" class="hidden selectable block">
			<div class="actions">
				<span class="exec" data-exec="=copy" title="Copy"><i class="ti ti-copy"></i></span>
				<span class="exec" data-exec="=readme" title="Open in new window"><i class="ti ti-window"></i></span>
			</div>
			<ui-bind path="!$STATUS" config="template" class="block">
				<script type="text/html">
				{{ if value.ts }}
				<div class="fs11"><b>Date:</b> {{ value.ts | format('[ts]') }} <i>({{ value.ts | time2 }})</i></div>
				<div class="noscrollbar mt5">
					<pre class="json">{{ value.data | debugprinter }}</pre>
				</div>
				{{ fi }}
				</script>
			</ui-bind>
		</ui-bind>
	</footer>
</body>

<script>

	Thelpers.debugprinter = function(value) {
		if (value) {
			value = JSON.parse(value);
			return typeof(value) === 'string' ? Thelpers.encode(value) : Thelpers.jsonformat(JSON.stringify(value, null, '\t'));
		} else
			return '';
	};

	TOUCH(function(exports, reinit) {

		if (reinit)
			return;

		let laststatus;
		let lastcolor;

		let autocolor = function() {
			if (lastcolor === exports.config.color)
				return;
			lastcolor = exports.config.color;
			exports.element.find('footer').css('background', exports.config.color ? FUNC.hex2rgba(exports.config.color, 0.3) : '');
		};

		exports.clear = function() {
			if (exports.config.once)
				SETTER('approve/show', 'Are you sure you want to clear data?', ':check-circle: Clear', () => exports.trigger());
			else
				exports.trigger();
		};

		exports.status = function(status, isinit) {
			laststatus = status;
			autocolor();
		};

		exports.configure = function() {
			exports.element.tclass('CLASS_example', exports.config.once);
			autocolor();
		};

		exports.copy = function() {
			SETTER('clipboard/copy @copied', laststatus.data);
		};

		exports.readme = function() {
			let ts = laststatus ? laststatus.ts : null;
			let status = laststatus ? JSON.parse(laststatus.data) : null;
			if (status != null) {
				if (typeof(status) !== 'string')
					status = JSON.stringify(status, null, '  ');
			} else
				status = '';
			FUNC.readme('Debug', '__Date:__ ' + (ts ? (ts.format('[ts]') + ' *(' + Thelpers.time(ts) + ')*\n\n') : '') + '```json\n' + status + '\n```');
		};

	});

</script>
