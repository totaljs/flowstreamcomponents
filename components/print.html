<script total>

	exports.id = 'print';
	exports.name = 'Print';
	exports.group = 'Common';
	exports.version = '8';
	exports.icon = 'ti ti-print';
	exports.author = 'Peter Širka | Total.js';
	exports.config = { repo: false, data: true, text: false, once: false };
	exports.inputs = [{ id: 'input', name: 'Input' }];

	exports.make = function(instance, config) {

		function serializer(key, value) {
			return value && value.type === 'Buffer' && value.data ? ('<Buffer ' + value.data.splice(0, 10).map(n => n.toString(16).padLeft(2, '0')).join('') + '...') : value;
		}

		let is = false;

		instance.message = function($) {

			if (config.once && is) {
				$.destroy();
				return;
			}

			let data = $.data;

			if (config.data !== false) {
				if (data instanceof Buffer)
					data = '<Buffer ' + data.toString('hex').substring(0, 10) + '...';
			}

			let count = 0;

			for (let key in config) {
				if (config[key])
					count++;
			}

			let output = count > 1 ? {} : null;

			if (config.repo) {
				if (output)
					output.repo = $.repo;
				else
					output = $.repository;
			}

			if (config.data) {
				if (output)
					output.data = $.data;
				else
					output = $.data;
			}

			if (output) {
				output = JSON.stringify(output, serializer);
				instance.status(output, 200);
			}

			is = true;
			$.destroy();
		};

		instance.trigger = function() {
			is = false;
			instance.status('');
		};

	};

</script>

<style>

	.CLASS pre { font-size: 10px; margin: 0; padding: 5px; background-color: #F0F0F0; border-radius: var(--radius); }

<readme>
The component prints incoming data in a JSON format.
</readme>

<settings>
	<div class="padding">
		<ui-component name="input" path="?.repo" config="type:checkbox">Shows repository</ui-component>
		<ui-component name="input" path="?.data" config="type:checkbox">Shows data</ui-component>
		<hr />
		<ui-component name="input" path="?.once" config="type:checkbox">Print the data once as an example</ui-component>
	</div>
</settings>

<body>
	<header>
		<button class="exec button" data-exec="=clear">Clear</button>
		<i class="$ICON"></i><ui-bind path="$CONFIG.once" config="text:value?'Example':'Print'"></ui-bind>
	</header>
	<footer>
		<ui-bind path="!$STATUS" config="html pre:debugprinter(value);show" class="hidden selectable block">
			<span class="readme exec" data-exec="=readme" title="Open in new window"><i class="ti ti-window"></i></span>
			<span class="copy exec" data-exec="=copy" title="Copy"><i class="ti ti-copy"></i></span>
			<div class="noscrollbar mt5">
				<pre class="json"></pre>
			</div>
		</ui-bind>
	</footer>
</body>

<script>

	W.debugprinter = function(value) {
		if (value) {
			value = JSON.parse(value);
			return typeof(value) === 'string' ? Thelpers.encode(value) : Thelpers.jsonformat(JSON.stringify(value, null, '\t'));
		} else
			return '';
	};

	TOUCH(function(exports, reinit) {

		if (reinit)
			return;

		let laststatus;

		exports.clear = function() {
			if (exports.config.once)
				SETTER('approve/show', 'Are you sure you want to clear data?', ':check-circle: Clear', () => exports.trigger());
			else
				exports.trigger();
		};

		exports.status = function(status, isinit) {
			laststatus = status;
		};

		exports.copy = function() {
			SETTER('clipboard/copy @copied', laststatus);
		};

		exports.readme = function() {
			let status = laststatus ? JSON.parse(laststatus) : null;
			if (status != null) {
				if (typeof(status) !== 'string')
					status = JSON.stringify(status, null, '  ');
			} else
				status = '';
			FUNC.readme('Debug', '```json\n' + status + '\n```');
		};

	});

</script>
