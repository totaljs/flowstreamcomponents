<script total>

	exports.id = 'printtext';
	exports.name = 'Print text';
	exports.group = 'Common';
	exports.version = '1';
	exports.icon = 'ti ti-print';
	exports.author = 'Peter Širka | Total.js';
	exports.config = { path: 'response' };
	exports.inputs = [{ id: 'input', name: 'Input' }];

	exports.make = function(instance, config) {

		function serializer(key, value) {
			return value && value.type === 'Buffer' && value.data ? ('<Buffer ' + value.data.splice(0, 10).map(n => n.toString(16).padLeft(2, '0')).join('') + '...') : value;
		}

		instance.message = function($) {

			let data = $.data;
			let text = '';

			if (data instanceof Buffer)
				data = '<Buffer ' + data.toString('hex').substring(0, 10) + '...';
			else if (data) {
				if (typeof(data) === 'object')
					text = data[config.path];
				else
					text = data.toString();
			}

			instance.status(text, 200);
			$.destroy();
		};

		instance.trigger = function() {
			instance.status('');
		};

	};

</script>

<script>

	TOUCH(function(exports, reinit) {

		if (reinit)
			return;

		let laststatus;

		exports.status = function(status, isinit) {
			laststatus = status;
		};

		exports.element.on('click', '.readme', function() {
