<script total>

	exports.id = 'fsrename';
	exports.name = 'Rename file';
	exports.icon = 'ti ti-input';
	exports.author = 'Peter Širka | Total.js';
	exports.version = '1';
	exports.group = 'Files';
	exports.config = { prop: 'filename', prop2: 'rename' };
	exports.inputs = [{ id: 'input', name: 'Input' }];
	exports.outputs = [{ id: 'output', name: 'Output' }, { id: 'error', name: 'Error' }];

	exports.make = function(instance, config) {
		instance.message = function($) {
			let data = $.data;
			Total.Fs.rename(Utils.get(data, config.prop), Utils.get(data, config.prop2), function(err) {
				if (err)
					$.send('error', err);
				else
					$.send('output');
			});
		};

	};

</script>

<readme>
