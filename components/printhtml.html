<script total>

	exports.id = 'printhtml';
	exports.name = 'Print HTML';
	exports.icon = 'ti ti-paint-brush';
	exports.author = 'Peter Širka | Total.js';
	exports.version = '2';
	exports.group = 'Common';
	exports.config = { template: '<b>{{ value }}</b>' };
	exports.inputs = [{ id: 'input', name: 'Input' }];
	exports.kind = 'output';

	exports.make = function(instance, config) {

		var template;

		instance.message = function($) {
			$.status(template({ value: $.data }));
			$.destroy();
		};

		instance.configure = function() {
			template = Tangular.compile(config.template);
		};

		instance.configure();

	};

</script>

<readme>
The component converts HTML-formatted data in the component body. You can easily visualise any data. The data is rendered on the server.
</readme>
